# Development overrides — publish ports to localhost for local testing.
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up --build
#
# Frontend (Nginx) → http://localhost:3000  (test the full stack incl. /api proxy)
# Backend (uvicorn) → http://localhost:8000  (direct access for debugging)

services:
  frontend:
    ports:
      - "3000:80"

  backend:
    ports:
      - "8000:8000"
