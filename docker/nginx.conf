# Nginx config for the frontend container (static React build).
# Wire this in at the Docker step (step 6): the frontend Dockerfile should
#   COPY docker/nginx.conf /etc/nginx/conf.d/default.conf
#
# Note: /api is routed to the backend by Pangolin (not by this container), so
# there is no /api proxy here. Security headers and TLS are handled upstream
# (backend middleware + Pangolin); this file's job is to serve the SPA.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Client-side routing catch-all: serve index.html for any path that isn't a
    # real file, so deep links like /about and /under-the-hood work on reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
