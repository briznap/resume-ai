# Nginx config for the frontend container (static React build + API proxy).
# Wired in by docker/frontend.Dockerfile:
#   COPY docker/nginx.conf /etc/nginx/conf.d/default.conf
#
# The backend has no published ports — it is only reachable through this proxy
# over the internal Docker network (service name `backend`).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container. No trailing slash on proxy_pass
    # so the full "/api/..." path is forwarded unchanged.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check also lives on the backend.
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache fingerprinted build assets.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Client-side routing catch-all: serve index.html for any path that isn't a
    # real file, so deep links like /about and /under-the-hood work on reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
